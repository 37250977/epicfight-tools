    <title data-i18n="Indestructible 转 CombatEvolution 格式工具">Indestructible 转 CombatEvolution 格式工具</title>
    <script id="ce-converter-core">
        const CONDITION_MAP = {
            "epicfight:within_distance": (cond) => ({ type: "combat_evolution:target_in_distance", min: cond.min || 0, max: cond.max || 0 }),
            "epicfight:health": (cond) => {
                let comp = cond.comparator || "less_ratio";
                if (!["less_ratio", "greater_ratio", "less_absolute", "greater_absolute"].includes(comp)) comp = "less_ratio";
                return { type: "combat_evolution:health_check", health: cond.health || 0, comparator: comp };
            },
            "indestructible:stamina": (cond) => {
                let comp = cond.comparator || "less_ratio";
                if (!["less_ratio", "greater_ratio", "less_absolute", "greater_absolute"].includes(comp)) comp = "less_ratio";
                return { type: "combat_evolution:stamina_check", stamina: cond.stamina || 0, comparator: comp };
            },
            "indestructible:attack_level": (cond) => ({ type: "combat_evolution:attack_level", min: cond.min || 1, max: cond.max || 1 }),
            "indestructible:phase": (cond) => ({ type: "combat_evolution:phase_between", min: cond.min || 0, max: cond.max || 0 }),
            "indestructible:guard_break": (cond) => ({ type: "combat_evolution:target_guard_break" }),
            "epicfight:within_angle": (cond) => ({ type: "combat_evolution:current_angle", side: "round", first: cond.min || 0, second: cond.max || 180 }),
            "epicfight:within_angle_horizontal": (cond) => ({ type: "combat_evolution:current_angle", side: "round", first: cond.min || 0, second: cond.max || 180 }),
            "epicfight:within_eye_height": (cond) => null // CE无直接等价，丢弃
        };

        function validateSchema(data) {
            const isIndestructible = data.combat_behavior !== undefined || 
                                     data.attributes !== undefined || 
                                     data.humanoid_weapon_motions !== undefined || 
                                     data.custom_guard_motion !== undefined ||
                                     data.stun_animations !== undefined ||
                                     data.default_livingmotions !== undefined;
            if (!isIndestructible) {
                throw new Error("文件格式不匹配，未检测到 Indestructible 特有字段");
            }
        }

        function convertConditions(conditions) {
            if (!conditions) return [];
            let newConds = [];
            for (let cond of conditions) {
                let pred = cond.predicate;
                if (pred && !pred.includes(':')) {
                    if (CONDITION_MAP["epicfight:" + pred]) {
                        pred = "epicfight:" + pred;
                    } else if (CONDITION_MAP["indestructible:" + pred]) {
                        pred = "indestructible:" + pred;
                    }
                }
                
                if (CONDITION_MAP[pred]) {
                    let mapped = CONDITION_MAP[pred](cond);
                    if (mapped !== null) newConds.push(mapped);
                } else {
                    let unmapped = { type: pred, ...cond };
                    delete unmapped.predicate;
                    newConds.push(unmapped);
                }
            }
            return newConds;
        }

        function convertCommandList(cmdList) {
            if (!cmdList) return [];
            return cmdList.map(cmd => {
                let time = cmd.time || 0;
                let onTarget = cmd.execute_at_target || false;
                let command = cmd.command || "";
                if (!command.startsWith("/")) command = "/" + command;
                if (time > 0) return { type: "in_time", timeStart: time, onTarget: onTarget, command: command };
                else return { type: "tick", onTarget: onTarget, command: command };
            });
        }

        function convertHitCommandList(cmdList) {
            if (!cmdList) return [];
            return cmdList.map(cmd => {
                let onTarget = cmd.execute_at_target || false;
                let command = cmd.command || "";
                if (!command.startsWith("/")) command = "/" + command;
                return { type: "success", phase: -1, onTarget: onTarget, command: command };
            });
        }

        function getDefaultLivingMotions(data) {
            if (data.default_livingmotions && typeof data.default_livingmotions === 'object' && !Array.isArray(data.default_livingmotions)) {
                return { ...data.default_livingmotions };
            }

            const isHumanoid = data.isHumanoid !== undefined ? data.isHumanoid : true;
            if (!isHumanoid) return {};

            return {
                idle: "epicfight:biped/living/idle",
                walk: "epicfight:biped/living/walk",
                chase: "epicfight:biped/living/walk",
                mount: "epicfight:biped/living/mount",
                float: "epicfight:biped/living/float",
                fall: "epicfight:biped/living/fall",
                death: "epicfight:biped/living/death"
            };
        }

        function convertBehavior(b) {
            let outB = {};
            if (b.conditions) {
                let conds = convertConditions(b.conditions);
                if (conds.length > 0) outB.conditions = conds;
            }
            
            if (b.animation) {
                outB.behaviorType = "action";
                outB.animation = b.animation; 
                
                let params = {};
                if (b.convert_time !== undefined) params.transitionTime = b.convert_time;
                if (b.play_speed !== undefined) params.playSpeed = b.play_speed;
                if (Object.keys(params).length > 0) outB.animationParams = params;

                if (b.command_list) {
                    let te = convertCommandList(b.command_list);
                    if (te.length > 0) outB.timeEvents = te;
                }
                if (b.hit_command_list) {
                    let he = convertHitCommandList(b.hit_command_list);
                    if (he.length > 0) outB.hitEvents = he;
                }
                if (b.damage_modifier && typeof b.damage_modifier === 'object') {
                    let phaseParam = { phase: -1 }; 
                    let mod = b.damage_modifier;
                    if (mod.damage !== undefined) phaseParam.damageMultiplier = mod.damage;
                    if (mod.impact !== undefined) phaseParam.impactMultiplier = mod.impact;
                    if (mod.armor_negation !== undefined) phaseParam.armorNegationMultiplier = mod.armor_negation;
                    if (mod.stun_type !== undefined) phaseParam.stunType = mod.stun_type;
                    if (Object.keys(phaseParam).length > 1) {
                        outB.animationParams = outB.animationParams || {};
                        outB.animationParams.phaseParams = [phaseParam];
                    }
                }
                if (b.set_phase !== undefined) {
                    outB.setPhase = b.set_phase;
                }
            } else if (b.guard !== undefined) {
                outB.behaviorType = "guard";
                outB.guardTime = b.guard;
                if (b.counter) {
                    outB.counterAnimation = b.counter; 
                    outB.counterType = "random";
                    outB.counterChance = b.counter_chance || 0.3;
                }
            } else if (b.wander !== undefined) {
                outB.behaviorType = "wander";
                outB.wanderTime = b.wander;
                if (b.x_axis !== undefined) outB.strafe = b.x_axis;
                if (b.z_axis !== undefined) outB.forward = b.z_axis;
            }

            if (b.stamina !== undefined && b.stamina > 0) {
                outB.addStamina = -b.stamina;
            }
            return outB;
        }

        function convertData(data) {
            let out = {
                faction: data.faction || "neutral",
                renderer: data.renderer || "skeleton",
                model: data.model || "skeleton",
                armature: data.armature || "epicfight:entity/biped",
                humanoid: data.isHumanoid !== undefined ? data.isHumanoid : true
            };

            if (data.attributes && typeof data.attributes === 'object') {
                let attrs = data.attributes;
                if (attrs.chasing_speed !== undefined) out.chasingSpeed = attrs.chasing_speed;
                if (attrs.scale !== undefined) out.scale = attrs.scale;
                if (attrs.stamina_regan_delay !== undefined) out.staminaRegenDelay = attrs.stamina_regan_delay;
                if (attrs.stamina_lose_multiply !== undefined) out.hurtImpact = attrs.stamina_lose_multiply;
                
                let outAttrs = [];
                if (attrs.max_stamina !== undefined) outAttrs.push({ attribute: "epicfight:staminar", value: attrs.max_stamina });
                if (attrs.stamina_regan_multiply !== undefined) outAttrs.push({ attribute: "epicfight:stamina_regen", value: attrs.stamina_regan_multiply });
                if (attrs.impact !== undefined) outAttrs.push({ attribute: "epicfight:impact", value: attrs.impact });
                if (attrs.armor_negation !== undefined) outAttrs.push({ attribute: "epicfight:armor_negation", value: attrs.armor_negation });
                
                if (outAttrs.length > 0) out.attributes = outAttrs;
            }

            if (data.stun_animations && Array.isArray(data.stun_animations)) out.stunAnimations = data.stun_animations;
            
            let defaultMotions = getDefaultLivingMotions(data);
            if (Object.keys(defaultMotions).length > 0) {
                out.default_livingmotions = { ...defaultMotions };
            }
            
            if (data.humanoid_weapon_motions && Array.isArray(data.humanoid_weapon_motions)) {
                out.weaponLivingMotions = [];
                for (let wm of data.humanoid_weapon_motions) {
                    if (!wm || typeof wm !== 'object') continue;
                    let combinedMotions = Object.assign({}, defaultMotions, (wm.livingmotions && typeof wm.livingmotions === 'object') ? wm.livingmotions : {});
                    let wMotion = {
                        weaponCategories: Array.isArray(wm.weapon_categories) ? wm.weapon_categories : [],
                        style: wm.style || "common",
                        livingMotions: combinedMotions
                    };
                    out.weaponLivingMotions.push(wMotion);
                }
            } else if (Object.keys(defaultMotions).length > 0) {
                out.weaponLivingMotions = [{
                    weaponCategories: [], 
                    style: "common",
                    livingMotions: defaultMotions
                }];
            }
            
            if (data.custom_guard_motion && Array.isArray(data.custom_guard_motion)) {
                out.guardHitAnimation = [];
                for (let gm of data.custom_guard_motion) {
                    if (!gm || typeof gm !== 'object') continue;
                    let gHit = {
                        weaponCategories: Array.isArray(gm.weapon_categories) ? gm.weapon_categories : [],
                        style: gm.style || "common",
                        animations: Array.isArray(gm.parry_animation) ? gm.parry_animation : [] 
                    };
                    if (gHit.animations.length === 0 && gm.guard) {
                        gHit.animations.push(gm.guard);
                    }
                    if (gHit.animations.length > 0) out.guardHitAnimation.push(gHit);
                }
            }

            if (data.combat_behavior && Array.isArray(data.combat_behavior)) {
                let outCbs = [];
                for (let idxCb = 0; idxCb < data.combat_behavior.length; idxCb++) {
                    let cb = data.combat_behavior[idxCb];
                    let outCb = {
                        weaponCategories: cb.weapon_categories || [],
                        style: cb.style || "common",
                        behaviorRoots: []
                    };

                    if (cb.behavior_series) {
                        for (let idxS = 0; idxS < cb.behavior_series.length; idxS++) {
                            let series = cb.behavior_series[idxS];
                            let root = {
                                rootName: "BehaviorRoot_" + idxS,
                                weight: series.weight || 1.0,
                                maxCooldown: series.cooldown || 0,
                                firstBehaviors: []
                            };

                            if (series.behaviors && series.behaviors.length > 0) {
                                let first = convertBehavior(series.behaviors[0]);
                                first.behaviorName = "Action_" + idxS + "_0";
                                let current = first;
                                for (let i = 1; i < series.behaviors.length; i++) {
                                    let next = convertBehavior(series.behaviors[i]);
                                    next.behaviorName = "Action_" + idxS + "_" + i;
                                    current.nextBehaviors = [next];
                                    current = next;
                                }
                                root.firstBehaviors.push(first);
                            }
                            outCb.behaviorRoots.push(root);
                        }
                    }
                    outCbs.push(outCb);
                }
                out.combatBehaviors = outCbs;
            }
            return out;
        }

        function customStringify(obj, indentLevel = 0) {
            if (obj === undefined) return undefined;
            if (obj === null) return "null";
            
            const indent = "\t".repeat(indentLevel);
            const nextIndent = "\t".repeat(indentLevel + 1);
            
            if (Array.isArray(obj)) {
                if (obj.length === 0) return "[]";
                let allSimple = obj.every(item => typeof item !== 'object' || item === null);
                if (allSimple) {
                    return "[" + obj.map(item => JSON.stringify(item)).join(", ") + "]";
                }
                
                let items = [];
                for (let i = 0; i < obj.length; i++) {
                    let itemStr = "";
                    let item = obj[i];
                    if (typeof item === 'object' && item !== null && !Array.isArray(item)) {
                        if (Object.keys(item).length <= 4 && !Object.values(item).some(v => typeof v === 'object' && v !== null)) {
                            itemStr = JSON.stringify(item);
                        } else {
                            itemStr = customStringify(item, indentLevel + 1);
                        }
                    } else {
                        itemStr = customStringify(item, indentLevel + 1);
                    }
                    
                    if (itemStr !== undefined) {
                        items.push(nextIndent + itemStr);
                    } else {
                        items.push(nextIndent + "null");
                    }
                }
                return "[\n" + items.join(",\n") + "\n" + indent + "]";
            } else if (typeof obj === 'object') {
                let keys = Object.keys(obj);
                if (keys.length === 0) return "{}";
                
                let items = [];
                for (let i = 0; i < keys.length; i++) {
                    let key = keys[i];
                    let valStr = customStringify(obj[key], indentLevel + 1);
                    if (valStr === undefined) continue;
                    
                    items.push(nextIndent + JSON.stringify(key) + ": " + valStr);
                }
                if (items.length === 0) return "{}";
                return "{\n" + items.join(",\n") + "\n" + indent + "}";
            } else {
                return JSON.stringify(obj);
            }
        }

        function getFirstJsonChar(text) {
            if (typeof text !== 'string') return '';
            let s = text.replace(/^\uFEFF/, '');
            for (let i = 0; i < s.length; i++) {
                const c = s[i];
                if (c === ' ' || c === '\n' || c === '\r' || c === '\t') continue;
                return c;
            }
            return '';
        }

        async function convertJsonTextToCE(text, fileName = "unknown.json") {
            const c = getFirstJsonChar(text.slice(0, 4096));
            if (c !== '{' && c !== '[') {
                throw new Error("文件内容不像 JSON（开头未发现 { 或 [）");
            }
            let json = JSON.parse(text);
            validateSchema(json);
            
            let ceJson = convertData(json);
            let jsonStr = customStringify(ceJson);
            
            return { jsonStr, fileName };
        }
    </script>

        function t(key) { return messages[lang] && messages[lang][key] ? messages[lang][key] : key; }
        
        function toggleLang() {
            lang = lang === 'zh' ? 'en' : 'zh';
            localStorage.setItem('ce_lang', lang);
            updateUIText();
        }
        
        function updateUIText() {
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (el.tagName === 'INPUT' && el.type === 'text') {
                    el.placeholder = t(key);
                } else if (['TITLE', 'H1', 'H2', 'H3', 'SPAN', 'DIV', 'BUTTON', 'LABEL', 'A', 'OPTION'].includes(el.tagName)) {
                    if (el.children.length === 0 || ['BUTTON', 'A', 'SPAN'].includes(el.tagName)) {
                        el.textContent = t(key);
                    } else {
                        for(let child of el.childNodes) {
                            if (child.nodeType === 3 && child.nodeValue.trim() !== '') {
                                child.nodeValue = t(key);
                                break;
                            }
                        }
                    }
                }
            });
            const langBtn = document.getElementById('langBtn');
            if(langBtn) {
                langBtn.textContent = '中文 / English';
            }

            document.documentElement.lang = lang === 'zh' ? 'zh-CN' : 'en';
            const currentMode = localStorage.getItem('ce_converter_theme_mode') || 'auto';
            updateThemeToggleLabel(currentMode);
        }
        
        document.addEventListener('DOMContentLoaded', () => {
            updateUIText();

                --info: #dcdcaa;
            }
        }

        html[data-theme="light"] {

            --log-border: #111827;
            --success: #059669;
            --error: #dc2626;
            --info: #a16207;
        }

        html[data-theme="dark"] {
            --bg: #1e1e1e;
            --text: #d4d4d4;
            --muted: #9ca3af;
            --card: #252526;

            --shadow: 0 4px 10px rgba(0,0,0,0.35);
            --input-bg: #222;
            --input-border: #444;
            --drop-bg: #2d2d2d;
            --drop-border: #555;

            --log-bg: #111;
            --log-border: #333;
            --success: #4ec9b0;
            --error: #f48771;
            --info: #dcdcaa;
        }

        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg); color: var(--text); padding: 20px; margin: 0; }
        .container { width: 100%; max-width: 800px; margin: 0 auto; background-color: var(--card); padding: 20px; border-radius: 10px; box-shadow: var(--shadow); box-sizing: border-box; border: 1px solid var(--border); }
        h1 { text-align: left; color: var(--text); font-size: 1.25rem; margin: 0; }
        p { line-height: 1.6; font-size: 14px; color: var(--text); }

        .topbar { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
        .title-row { display: flex; justify-content: space-between; align-items: center; gap: 10px; flex-wrap: wrap; }
        .nav { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }

        .nav-label { font-size: 12px; color: var(--muted); padding: 2px 6px; border: 1px solid var(--border); border-radius: 999px; }

        .btn { background-color: var(--primary); color: white; border: none; padding: 10px 20px; font-size: 16px; border-radius: 8px; cursor: pointer; display: inline-block; margin-top: 10px; width: 100%; box-sizing: border-box; text-align: center; transition: background-color 0.15s ease, transform 0.05s ease; }
        .btn:hover { background-color: var(--primary-hover); }
        .btn:active { transform: translateY(1px); }
        .btn:disabled { background-color: var(--btn-disabled-bg); color: var(--btn-disabled-text); cursor: not-allowed; }
        .btn-secondary { background-color: var(--secondary); }
        .btn-secondary:hover { background-color: color-mix(in srgb, var(--secondary) 85%, white); }
        .btn-warn { background-color: var(--warn); }
        .btn-warn:hover { background-color: color-mix(in srgb, var(--warn) 85%, white); }
        .btn-sm { padding: 6px 12px; font-size: 14px; margin-top: 0; width: auto; border-radius: 999px; text-decoration: none; }
        .btn.loading { position: relative; pointer-events: none; }
        .btn.loading::after { content: ""; position: absolute; right: 12px; top: 50%; width: 14px; height: 14px; margin-top: -7px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.35); border-top-color: rgba(255,255,255,0.95); animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        input[type="file"] { margin-bottom: 20px; display: block; width: 100%; padding: 10px; background: var(--input-bg); border-radius: 8px; border: 1px solid var(--input-border); color: var(--text); }
        input[type="text"] { background: var(--input-bg); border: 1px solid var(--input-border); color: var(--text); }

        #log { margin-top: 20px; padding: 15px; background: var(--log-bg); border-radius: 10px; min-height: 150px; overflow-y: auto; font-family: Consolas, monospace; white-space: pre-wrap; font-size: 14px; word-wrap: break-word; border: 1px solid var(--log-border); }
        .log-line { display: flex; gap: 8px; align-items: flex-start; padding: 2px 0; }
        .log-icon { width: 18px; flex: 0 0 18px; text-align: center; }
        .log-text { flex: 1 1 auto; }
        .log-more { margin-left: 6px; padding: 0 6px; font-size: 12px; border-radius: 999px; border: 1px solid color-mix(in srgb, var(--border) 70%, transparent); background: transparent; color: color-mix(in srgb, var(--muted) 80%, white); cursor: pointer; }
        .log-more:hover { filter: brightness(1.08); }

        #dropZone { border: 2px dashed var(--drop-border); padding: 30px 15px; text-align: center; border-radius: 12px; margin-bottom: 15px; cursor: pointer; transition: all 0.2s; background: var(--drop-bg); color: var(--muted); font-size: 14px; user-select: none; }

        #dropZone.disabled { opacity: 0.6; cursor: not-allowed; pointer-events: none; }

        #fileList { max-height: 150px; overflow-y: auto; background: color-mix(in srgb, var(--log-bg) 88%, transparent); padding: 10px; border-radius: 10px; margin-bottom: 15px; display: none; border: 1px solid var(--border); }
        .file-item { display: flex; justify-content: space-between; align-items: center; padding: 6px 8px; border-bottom: 1px solid color-mix(in srgb, var(--border) 65%, transparent); font-size: 13px; gap: 10px; }

        .tag { font-size: 12px; padding: 2px 8px; border-radius: 999px; border: 1px solid var(--border); color: var(--muted); flex: 0 0 auto; }
        .tag-selected { background: color-mix(in srgb, var(--card) 88%, var(--bg)); color: var(--muted); }
        .tag-processing { background: color-mix(in srgb, var(--primary) 18%, transparent); border-color: color-mix(in srgb, var(--primary) 45%, var(--border)); color: color-mix(in srgb, var(--primary) 75%, var(--text)); }
        .tag-success { background: color-mix(in srgb, var(--success) 18%, transparent); border-color: color-mix(in srgb, var(--success) 45%, var(--border)); color: var(--success); }
        .tag-failed { background: color-mix(in srgb, var(--error) 18%, transparent); border-color: color-mix(in srgb, var(--error) 45%, var(--border)); color: var(--error); }
        .tag-canceled { background: color-mix(in srgb, var(--muted) 18%, transparent); border-color: color-mix(in srgb, var(--muted) 40%, var(--border)); color: var(--muted); }

        .prefix-suffix-group { display: flex; flex-direction: column; gap: 10px; margin-bottom: 15px; background: color-mix(in srgb, var(--card) 92%, var(--bg)); padding: 10px; border-radius: 10px; border: 1px solid var(--border); }
        .prefix-suffix-group label { font-size: 14px; display: flex; flex-direction: column; gap: 5px; }
        .prefix-suffix-group input { margin: 0; display: block; width: 100%; padding: 8px; border-radius: 8px; box-sizing: border-box; }

        .button-group { display: flex; flex-direction: column; gap: 10px; align-items: stretch; width: 100%; }
        .progress-text { font-weight: 700; color: var(--success); flex-grow: 1; text-align: center; }
        .option { display: inline-flex; align-items: center; gap: 8px; font-size: 13px; color: var(--muted); padding: 6px 10px; border: 1px solid var(--border); border-radius: 999px; background: color-mix(in srgb, var(--card) 92%, var(--bg)); }
        .option input { accent-color: var(--primary); }

        .context-menu { position: fixed; z-index: 9999; min-width: 160px; background: var(--card); border: 1px solid var(--border); border-radius: 12px; box-shadow: var(--shadow); padding: 6px; }
        .context-menu button { width: 100%; text-align: left; background: transparent; border: none; color: var(--text); padding: 10px 10px; border-radius: 10px; cursor: pointer; font-size: 14px; }
        .context-menu button:hover { background: color-mix(in srgb, var(--primary) 12%, transparent); }
        .context-menu button:disabled { color: var(--btn-disabled-text); cursor: not-allowed; }
        .context-menu button:disabled:hover { background: transparent; }
        
        @media (min-width: 600px) {
            .btn { width: auto; }
            .prefix-suffix-group { flex-direction: row; align-items: center; }
            .prefix-suffix-group label { flex-direction: row; align-items: center; width: auto; }
            .prefix-suffix-group input { width: 150px; display: inline-block; }
            .button-group { flex-direction: row; align-items: center; flex-wrap: wrap; }
        }

</head>
<body>

        <div class="prefix-suffix-group">

            <label style="font-size:14px;"><span data-i18n="统一后缀 (例如: _ce)">统一后缀 (例如: _ce)</span> <input type="text" id="suffixInput" value="_ce"></label>

        </div>

            <button class="btn" id="convertBtn" onclick="processFiles()" data-i18n="开始转换 / 下载">开始转换 / 下载</button>

    <script>
        let selectedFiles = [];
        let failedFiles = [];
        let totalCount = 0;
        let processedCount = 0;
        let isProcessing = false;
        let workerObjectUrl = null;
        let abortRequested = false;
        const fileState = new Map();
        let runStartMs = 0;
        const FILE_SIZE_WARN_BYTES = 20 * 1024 * 1024;

        document.addEventListener('DOMContentLoaded', () => {
            const dropZone = document.getElementById('dropZone');
            const fileInput = document.getElementById('fileInput');
            const prefixInput = document.getElementById('prefixInput');
            const suffixInput = document.getElementById('suffixInput');
            initTheme();
            initConfig(prefixInput, suffixInput);
            initHotkeys();
            initSoundToggle();
            initContextMenu();
            initMobileFocusAssist();

            dropZone.addEventListener('click', () => fileInput.click());
            
            dropZone.addEventListener('dragover', (e) => {
                e.preventDefault();
                dropZone.classList.add('dragover');
            });
            
            dropZone.addEventListener('dragleave', () => {
                dropZone.classList.remove('dragover');
            });
            
            dropZone.addEventListener('drop', (e) => {
                e.preventDefault();
                dropZone.classList.remove('dragover');
                handleFiles(e.dataTransfer.files).catch(err => log(`读取文件失败: ${err?.message || err}`, "error"));
            });
            
            fileInput.addEventListener('change', (e) => {
                handleFiles(e.target.files).catch(err => log(`读取文件失败: ${err?.message || err}`, "error"));
                fileInput.value = ''; // Reset to allow re-selecting same files
            });
        });

        function formatBytes(bytes) {
            const n = typeof bytes === 'number' ? bytes : 0;
            if (!Number.isFinite(n) || n <= 0) return '0 B';
            const units = ['B', 'KB', 'MB', 'GB'];
            const idx = Math.min(units.length - 1, Math.floor(Math.log(n) / Math.log(1024)));
            const v = n / Math.pow(1024, idx);
            const fixed = v >= 100 || idx === 0 ? 0 : (v >= 10 ? 1 : 2);
            return `${v.toFixed(fixed)} ${units[idx]}`;
        }


        async function looksLikeJsonFile(file) {
            if (!file || typeof file.slice !== 'function') return false;
            try {
                const head = await file.slice(0, 4096).text();
                const c = getFirstJsonChar(head);
                return c === '{' || c === '[';
            } catch {
                return false;
            }
        }

        async function handleFiles(files) {
            let added = 0;
            const arr = Array.from(files || []);
            for (let file of arr) {
                const name = (file && file.name) ? file.name : '';
                if (!name.toLowerCase().endsWith('.json')) {
                    log(`已忽略非 JSON 文件: ${name || '(未知文件名)'}`, "info");
                    continue;
                }
                if (typeof file.size === 'number' && file.size >= FILE_SIZE_WARN_BYTES) {
                    log(`文件较大（${formatBytes(file.size)}），转换可能会卡顿: ${name}`, "warn");
                }
                const likely = await looksLikeJsonFile(file);
                if (!likely) {
                    log(`已忽略疑似非 JSON 内容的文件: ${name}`, "error");
                    continue;
                }
                if (!selectedFiles.some(f => f.name === file.name && f.size === file.size)) {
                    selectedFiles.push(file);
                    setFileStatus(file, 'selected');
                    added++;
                }
            }
            if (added > 0) renderFileList();
        }

        function makeFileKey(file) {
            const lm = typeof file.lastModified === 'number' ? file.lastModified : 0;
            return `${file.name}::${file.size}::${lm}`;
        }

        function getFileStatus(file) {
            const key = makeFileKey(file);
            const entry = fileState.get(key);
            return entry && typeof entry === 'object' ? entry : { status: 'selected', detail: '' };
        }

        function setFileStatus(file, status, detail = '') {
            const key = makeFileKey(file);
            fileState.set(key, { status, detail: detail || '' });
        }

        function deleteFileStatus(file) {
            const key = makeFileKey(file);
            fileState.delete(key);
        }

        function renderFileList() {
            const list = document.getElementById('fileList');
            if (selectedFiles.length === 0) {
                list.style.display = 'none';
                return;
            }
            list.style.display = 'block';
            list.innerHTML = '';
            selectedFiles.forEach((file, index) => {
                const st = getFileStatus(file);
                const tagText = st.status === 'processing' ? t('处理中') : (st.status === 'success' ? t('成功') : (st.status === 'failed' ? t('失败') : (st.status === 'canceled' ? t('已取消') : t('已选'))));
                const tagClass = st.status === 'processing' ? 'tag-processing' : (st.status === 'success' ? 'tag-success' : (st.status === 'failed' ? 'tag-failed' : (st.status === 'canceled' ? 'tag-canceled' : 'tag-selected')));
                const canRemove = !isProcessing && st.status !== 'processing';
                const div = document.createElement('div');
                div.className = 'file-item';
                div.addEventListener('contextmenu', (e) => {
                    e.preventDefault();
                    showContextMenu(e.clientX, e.clientY, index);
                });
                div.innerHTML = `
                    <span class="file-meta">
                        <span class="tag ${tagClass}">${tagText}</span>
                        <span class="file-name">📄 ${file.name} <span class="muted" style="font-size:12px;">(${(file.size/1024).toFixed(1)} KB)</span></span>
                    </span>
                    <button class="file-remove" onclick="removeFile(${index}, event)" title="${t('移除')}" ${canRemove ? '' : 'disabled'} style="${canRemove ? '' : 'opacity:0.5; cursor:not-allowed;'}">✖</button>
                `;
                list.appendChild(div);
            });
        }

        function removeFile(index, event) {
            event.stopPropagation();
            if (isProcessing) return;
            const f = selectedFiles[index];
            if (f) deleteFileStatus(f);
            selectedFiles.splice(index, 1);
            renderFileList();
        }

        function clearLog() {
            document.getElementById('log').innerHTML = `<span class="log-line info"><span class="log-icon">•</span><span class="log-text">${t('日志已清空。')}</span></span>`;
            document.getElementById('progressText').textContent = '';
            processedCount = 0;
            totalCount = 0;
            failedFiles = [];
            document.getElementById('retryBtn').style.display = 'none';
        }

        function clearAll() {
            if (isProcessing) return;
            selectedFiles = [];
            failedFiles = [];
            totalCount = 0;
            processedCount = 0;
            fileState.clear();
            document.getElementById('retryBtn').style.display = 'none';
            updateProgress();
            renderFileList();
            clearLog();
        }

        function cancelConversion() {
            if (!isProcessing) return;
            abortRequested = true;
            isDownloading = false;
            runStartMs = 0;
            if (Array.isArray(selectedFiles)) {
                for (const f of selectedFiles) {
                    const st = getFileStatus(f);
                    if (st.status === 'processing') setFileStatus(f, 'canceled');
                }
            }
            cleanupAfterRun();
            totalCount = 0;
            processedCount = 0;
            updateProgress();
            setProcessingState(false);
            log('已取消转换。', 'info');
        }

        function updateProgress() {
            const pt = document.getElementById('progressText');
            if (totalCount > 0) {
                const elapsed = isProcessing && runStartMs > 0 ? ` | 用时: ${formatDuration(performance.now() - runStartMs)}` : '';
                pt.textContent = `进度: ${processedCount} / ${totalCount}${elapsed}`;
            } else {
                pt.textContent = '';
            }
        }

        function formatDuration(ms) {
            const n = typeof ms === 'number' ? ms : 0;
            if (!Number.isFinite(n) || n <= 0) return '0s';
            const s = n / 1000;
            if (s < 60) return `${s.toFixed(s >= 10 ? 1 : 2)}s`;
            const m = Math.floor(s / 60);
            const rs = s - m * 60;
            return `${m}m ${rs.toFixed(0)}s`;
        }

        function log(msg, type='info') {
            const logDiv = document.getElementById('log');
            const line = document.createElement('span');
            line.className = `log-line ${type}`;
            const icon = document.createElement('span');
            icon.className = 'log-icon';
            icon.textContent = type === 'success' ? '✓' : (type === 'error' ? '✕' : (type === 'warn' ? '!' : '•'));
            const text = document.createElement('span');
            text.className = 'log-text';
            const prefix = `[${new Date().toLocaleTimeString()}] `;
            const full = prefix + (msg ?? '');
            const maxLen = 320;
            if (typeof full === 'string' && full.length > maxLen) {
                const short = full.slice(0, maxLen) + '…';
                text.textContent = short;
                const btn = document.createElement('button');
                btn.className = 'log-more';
                btn.type = 'button';
                btn.textContent = '展开';
                let expanded = false;
                btn.addEventListener('click', () => {
                    expanded = !expanded;
                    text.textContent = expanded ? full : short;
                    btn.textContent = expanded ? '收起' : '展开';
                });
                line.appendChild(icon);
                line.appendChild(text);
                line.appendChild(btn);
                logDiv.appendChild(line);
                logDiv.scrollTop = logDiv.scrollHeight;
                return;
            }
            text.textContent = full;
            line.appendChild(icon);
            line.appendChild(text);
            logDiv.appendChild(line);
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        function setProcessingState(next) {
            isProcessing = !!next;
            const dropZone = document.getElementById('dropZone');
            const fileInput = document.getElementById('fileInput');
            const prefixInput = document.getElementById('prefixInput');
            const suffixInput = document.getElementById('suffixInput');
            const convertBtn = document.getElementById('convertBtn');
            const retryBtn = document.getElementById('retryBtn');
            const clearLogBtn = document.getElementById('clearLogBtn');

            if (isProcessing) {
                dropZone.classList.add('disabled');
                fileInput.disabled = true;
                prefixInput.disabled = true;
                suffixInput.disabled = true;
                convertBtn.disabled = true;
                convertBtn.classList.add('loading');
                retryBtn.disabled = true;
                clearLogBtn.disabled = true;
            } else {
                dropZone.classList.remove('disabled');
                fileInput.disabled = false;
                prefixInput.disabled = false;
                suffixInput.disabled = false;
                convertBtn.disabled = false;
                convertBtn.classList.remove('loading');
                retryBtn.disabled = false;
                clearLogBtn.disabled = false;
            }
            renderFileList();
        }

        function updateThemeToggleLabel(mode) {
            const btn = document.getElementById('themeToggle');
            if (!btn) return;
            const label = lang === 'zh'
                ? (mode === 'dark' ? '深色' : (mode === 'light' ? '浅色' : '自动'))
                : (mode === 'dark' ? 'Dark' : (mode === 'light' ? 'Light' : 'Auto'));
            btn.textContent = (lang === 'zh' ? '主题: ' : 'Theme: ') + label;
        }

        function applyThemeMode(mode) {
            const m = mode === 'dark' ? 'dark' : (mode === 'light' ? 'light' : 'auto');
            if (m === 'auto') {
                document.documentElement.removeAttribute('data-theme');
            } else {
                document.documentElement.setAttribute('data-theme', m);
            }
            localStorage.setItem('ce_converter_theme_mode', m);
            updateThemeToggleLabel(m);
        }

        function initTheme() {
            const mode = localStorage.getItem('ce_converter_theme_mode') || 'auto';
            applyThemeMode(mode);
        }

        function toggleTheme() {
            const current = localStorage.getItem('ce_converter_theme_mode') || 'auto';
            const next = current === 'auto' ? 'light' : (current === 'light' ? 'dark' : 'auto');
            applyThemeMode(next);
        }

        function initConfig(prefixInput, suffixInput) {
            const savedPrefix = localStorage.getItem('ce_converter_output_prefix');
            const savedSuffix = localStorage.getItem('ce_converter_output_suffix');
            if (typeof savedPrefix === 'string') prefixInput.value = savedPrefix;
            if (typeof savedSuffix === 'string') suffixInput.value = savedSuffix;
            prefixInput.addEventListener('input', () => localStorage.setItem('ce_converter_output_prefix', prefixInput.value));
            suffixInput.addEventListener('input', () => localStorage.setItem('ce_converter_output_suffix', suffixInput.value));
        }

        function initSoundToggle() {
            const key = 'ce_converter_done_sound';
            const el = document.getElementById('soundToggle');
            if (!el) return;
            const saved = localStorage.getItem(key);
            el.checked = saved === '1';
            el.addEventListener('change', () => {
                localStorage.setItem(key, el.checked ? '1' : '0');
            });
        }

        function shouldPlayDoneSound() {
            return localStorage.getItem('ce_converter_done_sound') === '1';
        }

        function playDoneSound() {
            if (!shouldPlayDoneSound()) return;
            const Ctx = window.AudioContext || window.webkitAudioContext;
            if (!Ctx) return;
            const ctx = new Ctx();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.type = 'sine';
            osc.frequency.value = 880;
            gain.gain.value = 0.0001;
            osc.connect(gain);
            gain.connect(ctx.destination);
            const t0 = ctx.currentTime;
            gain.gain.setValueAtTime(0.0001, t0);
            gain.gain.exponentialRampToValueAtTime(0.25, t0 + 0.01);
            gain.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.18);
            osc.start(t0);
            osc.stop(t0 + 0.2);
            osc.onended = () => ctx.close().catch(() => {});
        }

        function initMobileFocusAssist() {
            document.addEventListener('focusin', (e) => {
                const t = e.target;
                if (!(t instanceof HTMLElement)) return;
                if (t.tagName !== 'INPUT' && t.tagName !== 'TEXTAREA') return;
                const isMobile = (window.matchMedia && window.matchMedia('(pointer: coarse)').matches) || /Android|iPhone|iPad|iPod/i.test(navigator.userAgent || '');
                if (!isMobile) return;
                setTimeout(() => {
                    try {
                        t.scrollIntoView({ behavior: 'smooth', block: 'center', inline: 'nearest' });
                    } catch {}
                }, 50);
            });
        }

        function initContextMenu() {
            const menu = document.getElementById('contextMenu');
            if (!menu) return;
            const btnRemove = document.getElementById('ctxRemove');
            const btnClear = document.getElementById('ctxClear');

            const hide = () => {
                menu.style.display = 'none';
                menu.dataset.index = '';
            };

            btnRemove.addEventListener('click', () => {
                if (isProcessing) return hide();
                const idx = Number(menu.dataset.index);
                if (Number.isFinite(idx)) removeFile(idx, { stopPropagation() {} });
                hide();
            });
            btnClear.addEventListener('click', () => {
                if (isProcessing) return hide();
                clearAll();
                hide();
            });

            document.addEventListener('click', (e) => {
                if (menu.style.display !== 'none' && !menu.contains(e.target)) hide();
            });
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') hide();
            });
            window.addEventListener('blur', hide);

            window.showContextMenu = (x, y, index) => {
                if (isProcessing) return;
                menu.dataset.index = String(index);
                btnRemove.disabled = !(index >= 0 && index < selectedFiles.length);
                btnClear.disabled = selectedFiles.length === 0;
                menu.style.display = 'block';
                const rect = menu.getBoundingClientRect();
                const maxX = Math.max(8, window.innerWidth - rect.width - 8);
                const maxY = Math.max(8, window.innerHeight - rect.height - 8);
                const nx = Math.min(Math.max(8, x), maxX);
                const ny = Math.min(Math.max(8, y), maxY);
                menu.style.left = `${nx}px`;
                menu.style.top = `${ny}px`;
            };
        }

        function sanitizeFileNamePart(part) {
            const s = String(part ?? '');
            const cleaned = s
                .replace(/[\\\/:\*\?"<>\|\u0000-\u001F]/g, '_')
                .replace(/\s+/g, ' ')
                .trim()
                .replace(/[. ]+$/g, '');
            if (!cleaned) return '';
            return cleaned.length > 120 ? cleaned.slice(0, 120) : cleaned;
        }

        function makeSafeDownloadName(prefix, baseName, suffix) {
            const p = sanitizeFileNamePart(prefix);
            const b = sanitizeFileNamePart(baseName) || 'converted';
            const s = sanitizeFileNamePart(suffix);
            const joined = `${p}${b}${s}`;
            const safe = sanitizeFileNamePart(joined) || 'converted';
            return `${safe}.json`;
        }

        function isTypingInInput(target) {
            const el = target;
            const tag = el && el.tagName ? el.tagName.toLowerCase() : '';
            return tag === 'input' || tag === 'textarea' || (el && el.isContentEditable);
        }

        function initHotkeys() {
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    if (isTypingInInput(e.target)) return;
                    if (!isProcessing) processFiles();
                } else if (e.key === 'Escape') {
                    if (isProcessing) {
                        cancelConversion();
                    } else {
                        clearAll();
                    }
                }
            });

            document.addEventListener('paste', (e) => {
                const files = e.clipboardData && e.clipboardData.files ? e.clipboardData.files : null;
                if (files && files.length > 0) {
                    handleFiles(files).catch(err => log(`读取文件失败: ${err?.message || err}`, "error"));
                }
            });
        }


        // --- Web Worker Code ---
        const workerCode = `
            self.onmessage = async function(e) {
                const file = e.data.file;
                const jobId = e.data.jobId;
                try {
                    let text = await file.text();
                    let { jsonStr, fileName } = await convertJsonTextToCE(text, file.name);
                    
                    self.postMessage({ success: true, jobId: jobId, fileName: fileName, jsonStr: jsonStr });
                    jsonStr = null;
                } catch (err) {
                    self.postMessage({ success: false, jobId: jobId, fileName: file.name, error: err.message });
                }
            };
        `;

        let myWorker = null;
        let downloadQueue = [];
        let isDownloading = false;
        let filesToProcess = [];
        let currentProcessingIndex = 0;
        let resendFilesQueue = [];
        let inFlightJobs = new Map();
        let inFlightOrder = [];
        let nextJobId = 1;

        function processDownloadQueue() {
            if (abortRequested) {
                downloadQueue.length = 0;
                isDownloading = false;
                return;
            }
            if (isDownloading || downloadQueue.length === 0) return;
            isDownloading = true;
            
            let item = downloadQueue.shift();
            let jsonStr = item && typeof item.jsonStr === 'string' ? item.jsonStr : '';
            if (item) item.jsonStr = null;
            
            let blob = new Blob([jsonStr], { type: "application/json" });
            jsonStr = null;
            let url = URL.createObjectURL(blob);
            
            let a = document.createElement('a');
            a.href = url;
            
            let prefix = document.getElementById('prefixInput').value.trim();
            let suffix = document.getElementById('suffixInput').value.trim();
            let baseName = item.fileName.replace(/\.json$/i, '');
            let newName = makeSafeDownloadName(prefix, baseName, suffix);
            
            a.download = newName;
            
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            
            URL.revokeObjectURL(url);
            a.href = '';
            log(`成功转换并下载: ${item.fileName} -> ${newName}`, "success");
            
            setTimeout(() => {
                isDownloading = false;
                processDownloadQueue();
                maybeFinishProcessing();
            }, 150);
        }

        function cleanupAfterRun() {
            downloadQueue.length = 0;
            resendFilesQueue.length = 0;
            filesToProcess.length = 0;
            currentProcessingIndex = 0;
            inFlightJobs.clear();
            inFlightOrder.length = 0;

            if (myWorker) {
                myWorker.terminate();
                myWorker = null;
            }
            if (workerObjectUrl) {
                URL.revokeObjectURL(workerObjectUrl);
                workerObjectUrl = null;
            }
        }

        function removeInFlightOrder(jobId) {
            const idx = inFlightOrder.indexOf(jobId);
            if (idx >= 0) inFlightOrder.splice(idx, 1);
        }

        function createWorker() {
            if (myWorker) {
                myWorker.terminate();
            }
            if (workerObjectUrl) {
                URL.revokeObjectURL(workerObjectUrl);
                workerObjectUrl = null;
            }
            
            const coreScript = document.getElementById('ce-converter-core').textContent;
            const fullWorkerCode = coreScript + '\n' + workerCode;
            const blob = new Blob([fullWorkerCode], { type: 'application/javascript' });
            
            try {
                workerObjectUrl = URL.createObjectURL(blob);
                myWorker = new Worker(workerObjectUrl);
                URL.revokeObjectURL(workerObjectUrl);
                workerObjectUrl = null;
            } catch (err) {
                log(`Worker 初始化失败（可能被 CSP 拦截），将使用主线程顺序转换: ${err?.message || err}`, "error");
                myWorker = null;
                return false;
            }
            
            myWorker.onmessage = function(e) {
                const result = e.data;
                const jobId = result && typeof result.jobId === 'number' ? result.jobId : null;
                const originalFile = jobId !== null ? inFlightJobs.get(jobId) : null;
                if (jobId !== null) {
                    inFlightJobs.delete(jobId);
                    removeInFlightOrder(jobId);
                }
                if (abortRequested) {
                    if (originalFile) setFileStatus(originalFile, 'canceled');
                    renderFileList();
                    return;
                }
                processedCount++;
                updateProgress();

                if (result.success) {
                    if (originalFile) setFileStatus(originalFile, 'success');
                    downloadQueue.push({ fileName: result.fileName, jsonStr: result.jsonStr });
                    processDownloadQueue();
                } else {
                    if (originalFile) failedFiles.push(originalFile);
                    if (originalFile) setFileStatus(originalFile, 'failed', result.error || '');
                    log(`转换失败: ${result.fileName} (错误: ${result.error})`, "error");
                    document.getElementById('retryBtn').style.display = 'inline-block';
                }
                
                sendNextBatch();
                renderFileList();
                maybeFinishProcessing();
            };
            
            myWorker.onerror = function(err) {
                log(`Worker 发生系统级错误或崩溃: ${err.message}`, "error");
                const suspectedJobId = inFlightOrder.length > 0 ? inFlightOrder[inFlightOrder.length - 1] : null;
                if (suspectedJobId !== null) {
                    const suspectedFile = inFlightJobs.get(suspectedJobId);
                    inFlightJobs.delete(suspectedJobId);
                    inFlightOrder.pop();
                    if (suspectedFile) {
                        failedFiles.push(suspectedFile);
                        setFileStatus(suspectedFile, 'failed', err?.message || 'Worker 崩溃');
                        document.getElementById('retryBtn').style.display = 'inline-block';
                        processedCount++;
                        updateProgress();
                    }
                }

                const toResend = [];
                for (const jid of inFlightOrder) {
                    const f = inFlightJobs.get(jid);
                    if (f) toResend.push(f);
                }
                inFlightJobs.clear();
                inFlightOrder.length = 0;
                resendFilesQueue = toResend.concat(resendFilesQueue);

                const ok = createWorker();
                if (!ok) {
                    const remaining = resendFilesQueue.concat(filesToProcess.slice(currentProcessingIndex));
                    resendFilesQueue = [];
                    filesToProcess = [];
                    currentProcessingIndex = 0;
                    convertInMainThread(remaining);
                    return;
                }

                while (inFlightJobs.size < 3) {
                    const sent = sendNextBatch();
                    if (!sent) break;
                }
                renderFileList();
                maybeFinishProcessing();
            };
            return true;
        }

        function sendNextBatch() {
            if (!myWorker) return false;
            if (abortRequested) return false;
            let file = null;
            if (resendFilesQueue.length > 0) {
                file = resendFilesQueue.shift();
            } else if (currentProcessingIndex < filesToProcess.length) {
                file = filesToProcess[currentProcessingIndex];
                currentProcessingIndex++;
            } else {
                return false;
            }
            const jobId = nextJobId++;
            inFlightJobs.set(jobId, file);
            inFlightOrder.push(jobId);
            myWorker.postMessage({ file, jobId });
            return true;
        }

        function triggerWorker(files) {
            filesToProcess = files;
            currentProcessingIndex = 0;
            resendFilesQueue = [];
            inFlightJobs.clear();
            inFlightOrder.length = 0;
            nextJobId = 1;
            
            const ok = createWorker();
            if (!ok) {
                convertInMainThread(filesToProcess);
                return;
            }
            
            // 初始启动发送几个并行（比如 3 个），后续在 onmessage 里继续发送
            let initialBatch = Math.min(3, files.length);
            for (let i = 0; i < initialBatch; i++) {
                sendNextBatch();
            }
        }

        async function convertInMainThread(files) {
            for (let i = 0; i < files.length; i++) {
                const file = files[i];
                if (abortRequested) {
                    setFileStatus(file, 'canceled');
                    processedCount++;
                    updateProgress();
                    continue;
                }
                setFileStatus(file, 'processing');
                renderFileList();
                try {
                    let text = await file.text();
                    let { jsonStr, fileName } = await convertJsonTextToCE(text, file.name);
                    processedCount++;
                    updateProgress();
                    setFileStatus(file, 'success');
                    downloadQueue.push({ fileName, jsonStr });
                    processDownloadQueue();
                } catch (err) {
                    processedCount++;
                    updateProgress();
                    failedFiles.push(file);
                    setFileStatus(file, 'failed', err?.message || String(err));
                    log(`转换失败: ${file.name} (错误: ${err?.message || err})`, "error");
                    document.getElementById('retryBtn').style.display = 'inline-block';
                }
            }
            maybeFinishProcessing();
        }



        function maybeFinishProcessing() {
            const allResultsReceived = totalCount > 0 && processedCount >= totalCount;
            if (!allResultsReceived) return;
            const noPendingDownloads = downloadQueue.length === 0 && !isDownloading;
            if (!noPendingDownloads) return;
            const duration = runStartMs > 0 ? performance.now() - runStartMs : 0;
            runStartMs = 0;
            cleanupAfterRun();
            setProcessingState(false);
            const summaryType = failedFiles.length > 0 ? "error" : "success";
            const timeText = duration > 0 ? ` ${t('总耗时:')} ${formatDuration(duration)}` : '';
            log(`${t('全部完成！成功:')} ${totalCount - failedFiles.length} ${t('失败:')} ${failedFiles.length}${timeText}`, summaryType);
            playDoneSound();
            updateProgress();
        }

        function processFiles() {
            if (isProcessing) {
                log(t("处理中...禁止重复点击"), "info");
                return;
            }
            if (selectedFiles.length === 0) {
                log(t("请先选择要转换的文件。"), "error");
                return;
            }

            abortRequested = false;
            failedFiles = [];
            document.getElementById('retryBtn').style.display = 'none';
            totalCount = selectedFiles.length;
            processedCount = 0;
            runStartMs = performance.now();
            updateProgress();
            for (const f of selectedFiles) setFileStatus(f, 'processing');
            renderFileList();

            log(`${t('开始批量转换')} ${totalCount} ${t('个文件 (启用异步加速)...')}`, "info");
            setProcessingState(true);
            triggerWorker(selectedFiles);
        }

        function retryFailed() {
            if (isProcessing) {
                log(t("处理中...禁止重复点击"), "info");
                return;
            }
            if (failedFiles.length === 0) return;
            const filesToRetry = [...failedFiles];
            failedFiles = [];
            document.getElementById('retryBtn').style.display = 'none';
            
            abortRequested = false;
            totalCount = filesToRetry.length;
            processedCount = 0;
            runStartMs = performance.now();
            updateProgress();
            for (const f of filesToRetry) setFileStatus(f, 'processing');
            renderFileList();

            log(`${t('重试')} ${totalCount} ${t('个失败文件...')}`, "info");
            setProcessingState(true);
            triggerWorker(filesToRetry);
        }
    </script>
</body>
</html>
